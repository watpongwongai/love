<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💌 ถึงคนพิเศษ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffd1dc);
}

/* พื้นหลังหัวใจ */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at 20% 30%,rgba(255,255,255,.4),transparent 15%),
    radial-gradient(circle at 80% 60%,rgba(255,255,255,.3),transparent 20%);
}

.container{
    position:relative;
    text-align:center;
    z-index:5;
}

/* ซองจดหมาย */

.envelope{
    width:340px;
    height:220px;
    position:relative;
    margin:auto;
    cursor:pointer;
}

.base{
    width:100%;
    height:100%;
    background:#fff;
    border-radius:0 0 12px 12px;
    position:absolute;
    bottom:0;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.flap{
    position:absolute;
    width:100%;
    height:120px;
    background:#ff6b81;
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top;
    transition:1s;
    z-index:10;
}

/* กระดาษ */

.letter{
    position:absolute;
    width:90%;
    height:280px;
    left:5%;
    top:25px;
    background:white;
    border-radius:12px;
    padding:30px;
    transform:translateY(120px);
    transition:1.4s;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
    overflow:hidden;
}

.letter h2{
    color:#ff4d6d;
    margin-bottom:20px;
}

#message{
    color:#555;
    font-size:18px;
    line-height:1.8;
    white-space:pre-wrap;
}

.open .flap{
    transform:rotateX(180deg);
}

.open .letter{
    transform:translateY(-130px);
}

/* ปุ่ม */

button{
    margin-top:40px;
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.next{
    display:none;
}

/* หัวใจ */

.heart{
    position:absolute;
    color:#ff4d6d;
    animation:float linear infinite;
    opacity:.8;
}

@keyframes float{

from{
transform:translateY(100vh);
}

to{
transform:translateY(-100px);
}

}
</style>

</head>
<body>

<div class="container">

<div id="envelope" class="envelope">

<div class="flap"></div>

<div class="base"></div>

<div class="letter">

<h2>💌 ถึงคนพิเศษ</h2>

<p id="message"></p>

</div>

</div>

<button id="openBtn">
💌 เปิดจดหมาย
</button>

<br>

<button id="nextBtn" class="next">
❤️ อ่านต่อ
</button>

</div>

<script>

// หัวใจลอย
function createHeart(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(15+Math.random()*25)+"px";

h.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},10000);

}

setInterval(createHeart,400);

// --------------------

const text=`ถึงคนที่ทำให้ทุกวันของฉันมีรอยยิ้ม 😊

ขอบคุณที่เข้ามาในชีวิต

ขอบคุณที่คอยอยู่ข้างกัน

ไม่ว่าจะวันธรรมดา
หรือวันที่เหนื่อยที่สุด

แค่มีเธอ...

ทุกอย่างก็ดีขึ้นเสมอ ❤️

รักเธอนะ`;

// --------------------

const openBtn=document.getElementById("openBtn");

const nextBtn=document.getElementById("nextBtn");

const msg=document.getElementById("message");

const envelope=document.getElementById("envelope");

openBtn.onclick=function(){

envelope.classList.add("open");

openBtn.style.display="none";

setTimeout(typeWriter,1200);

}

let i=0;

function typeWriter(){

if(i<text.length){

msg.innerHTML+=text.charAt(i);

i++;

setTimeout(typeWriter,45);

}
else{

nextBtn.style.display="inline-block";

}

}

nextBtn.onclick=function(){

alert("หน้าถัดไปจะเป็น Gallery รูปคู่ ❤️");

// ภายหลังเปลี่ยนเป็น
// location.href="gallery.html";

}

</script>

</body>
</html>
