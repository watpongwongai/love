

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ความทรงจำ ❤️</title>

<style>
.gallery img:nth-child(1){ animation-delay:0.3s; }
.gallery img:nth-child(2){ animation-delay:0.6s; }
.gallery img:nth-child(3){ animation-delay:0.9s; }
.gallery img:nth-child(4){ animation-delay:1.2s; }
.gallery img:nth-child(5){ animation-delay:1.5s; }
.gallery img:nth-child(6){ animation-delay:1.8s; }

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:sans-serif;
    text-align:center;
    color:white;
    overflow-x:hidden;

    opacity:0;
    animation:pageFade 1.2s ease forwards;
}

@keyframes pageFade{
    to{
        opacity:1;
    }
}


/* หัวเรื่อง */
h1{
    margin-top:30px;
    font-size:32px;
    animation:
        fadeDown 1s ease,
        glow 2.5s ease-in-out infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 5px white;
    }
    to{
        text-shadow:0 0 20px white, 0 0 30px pink;
    }
}

/* grid */
.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    padding:20px;
}

/* รูป */
.gallery img{
    width:100%;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,.3);
    cursor:pointer;

    opacity:0;
    animation:fadeUp 0.8s forwards;
}

/* wrapper สำหรับ float */
.img-box{
    opacity:0;
    transform:translateY(60px) scale(0.9);
    filter:blur(5px);
    transition:all 0.7s ease;
}

.img-box.show{
    opacity:1;
    transform:translateY(0) scale(1);
    filter:blur(0);
}
/* 🌸 รูปขยับตลอดเวลา */
@keyframes floatImg{
    0%{
        transform:translateY(0px) scale(1);
    }
    50%{
        transform:translateY(-10px) scale(1.03);
    }
    100%{
        transform:translateY(0px) scale(1);
    }
}

.gallery img:hover{
    transform:scale(1.08) rotate(1deg);
}

/* fade animation */
@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeDown{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

/* หัวใจลอย */
.heart{
    position:absolute;
    color:white;
    font-size:18px;
    animation:float 6s linear infinite;
    opacity:0.7;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}

/* lightbox */
#lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.8);
    display:none;
    justify-content:center;
    align-items:center;
}

#lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:15px;
    box-shadow:0 10px 40px rgba(0,0,0,.5);
}
.sparkle{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation:sparkleAnim 2s linear forwards;
}

@keyframes sparkleAnim{
    0%{
        transform:scale(0) translateY(0);
        opacity:1;
    }
    100%{
        transform:scale(1.5) translateY(-50px);
        opacity:0;
    }
}
/* โหลด */
#loading{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

/* หัวใจเต้น */
.heart{
    font-size:60px;
    animation:beat 0.8s infinite;
}

@keyframes beat{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.3); }
    100%{ transform:scale(1); }
}

#load-text{
    margin-top:20px;
    font-size:20px;
}
/* ฉากโหลด */
#loading{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at center, #ffc1cc, #ff9a9e);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

/* กล่องกลาง */
.loader-box{
    text-align:center;
}

/* 💖 หัวใจ */
.big-heart{
    font-size:80px;
    margin-bottom:30px;
    animation:beat 1s infinite;
    filter:drop-shadow(0 0 15px rgba(255,255,255,0.9));
}

@keyframes beat{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.3); }
    100%{ transform:scale(1); }
}

/* ✅ ✅ แท่งใหญ่ */
.progress-bar{
    width:350px;          /* ✅ ใหญ่ขึ้น */
    height:22px;          /* ✅ หนาขึ้น */
    background:rgba(255,255,255,0.25);
    border-radius:50px;
    overflow:hidden;
    backdrop-filter:blur(10px);

    box-shadow:
        0 0 25px rgba(255,255,255,0.4),
        inset 0 0 10px rgba(255,255,255,0.3);
}

/* ✅ ตัวโหลด */
#progress{
    width:0%;
    height:100%;
    border-radius:50px;

    background:linear-gradient(
        90deg,
        #ff4e70,
        #ff8fa3,
        #ffd1dc,
        #ffffff
    );

    background-size:200% 100%;
    animation:flow 2s linear infinite;

    box-shadow:
        0 0 20px #ff6a88,
        0 0 40px #ff9a9e;
}

/* สีไหล */
@keyframes flow{
    0%{ background-position:0%; }
    100%{ background-position:200%; }
}

/* 🔵 วงหมุนรอบ */
.ring{
    position:absolute;
    top:-30px;
    left:50%;
    transform:translateX(-50%);
    width:140px;
    height:140px;
    border:3px solid white;
    border-radius:50%;
    animation:spin 4s linear infinite;
    opacity:0.6;
}

@keyframes spin{
    0%{ transform:translateX(-50%) rotate(0); }
    100%{ transform:translateX(-50%) rotate(360deg); }
}

/* 📊 แถบโหลด */
.progress-bar{
    width:200px;
    height:8px;
    background:rgba(255,255,255,0.3);
    border-radius:10px;
    margin-top:20px;
    overflow:hidden;
}

#progress{
    width:0%;
    height:100%;
    background:linear-gradient(90deg, #ffffff, #ffdde1, #ffffff);
    border-radius:10px;
    position:relative;
    overflow:hidden;
}

/* แสงวิ่งในหลอด */
#progress::after{
    content:"";
    position:absolute;
    top:0;
    left:-50px;
    width:50px;
    height:100%;
    background:rgba(255,255,255,0.7);
    transform:skewX(-20deg);
    animation:shine 1s infinite;
}

@keyframes shine{
    0%{ left:-50px; }
    100%{ left:100%; }
}

/* 🔢 เปอร์เซ็น */
#load-text{
    margin-top:10px;
    font-size:20px;
    color:white;
}

/* ✨ วิ้งๆ */
.sparkle{
    position:absolute;
    width:5px;
    height:5px;
    background:white;
    border-radius:50%;
    animation:sparkle 2s linear forwards;
}

@keyframes sparkle{
    0%{
        transform:scale(0);
        opacity:1;
    }
    100%{
        transform:translateY(-40px) scale(1.5);
        opacity:0;
    }
}
.gallery img{
    width:100%;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,.3);
    cursor:pointer;

    opacity:0;
    animation:fadeUp 0.8s forwards;

    /* 👇 เพิ่มตรงนี้ */
    animation: fadeUp 0.8s forwards, floatImg 4s ease-in-out infinite;
}
</style>
</head>
<div id="loading">
    <div class="loader-box">

        <div class="big-heart">❤️</div>

        <div class="progress-bar">
            <div id="progress"></div>
        </div>

    </div>
</div>

<body>
<audio id="bgMusic" loop preload="auto">
    <source src="music/love.mp3" type="audio/mpeg">
</audio>
<div id="main-content" style="display:none;">
<h1>📸 ความทรงจำของเรา ❤️</h1>

<div class="gallery">
    <div class="img-box" style="--i:1">
    <img src="img/1.jpg"></div>
    <div class="img-box" style="--i:2">
    <img src="img/2.jpg"></div>
    <div class="img-box" style="--i:3">
    <img src="img/3.jpg"></div>
    <div class="img-box" style="--i:4">
    <img src="img/4.jpg"></div>
    <div class="img-box" style="--i:5">
    <img src="img/5.jpg"></div>
    <div class="img-box" style="--i:6">
    <img src="img/6.jpg"></div>

</div>
<p class="subtitle">กำลังสร้างรูปภาพความทรงจำ...</p>
</div>
<!-- lightbox -->
<div id="lightbox">
    <img id="lightbox-img">
</div>

<script>
const boxes = document.querySelectorAll(".img-box");

const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
}, {
    threshold: 0.2
});

boxes.forEach(box=>{
    observer.observe(box);
});
/* 🌸 หัวใจลอย */
function createHeart(){
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random()*100 + "vw";
    h.style.fontSize = (10 + Math.random()*20) + "px";
    h.style.animationDuration = (4 + Math.random()*5) + "s";
    document.body.appendChild(h);

    setTimeout(()=>h.remove(), 8000);
}
setInterval(createHeart, 300);

/* 📸 lightbox */
const imgs = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

imgs.forEach(img=>{
    img.addEventListener("click", ()=>{
        lightbox.style.display = "flex";
        lightboxImg.src = img.src;
    });
});

lightbox.addEventListener("click", ()=>{
    lightbox.style.display = "none";
});
function createSparkle(){
    const s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*100 + "vh";
    document.body.appendChild(s);

    setTimeout(()=>s.remove(), 2000);
}

let percent = 0;

const progress = document.getElementById("progress");
const loading = document.getElementById("loading");
const main = document.getElementById("main-content");

const interval = setInterval(()=>{

    percent++;
    progress.style.width = percent + "%";

    if(percent >= 100){
        clearInterval(interval);

        loading.style.opacity = "0";
        setTimeout(()=>{
            loading.style.display = "none";
            main.style.display = "block";
        },500);
    }

}, 25);

window.addEventListener("load", async () => {

    const music = document.getElementById("bgMusic");

    const playing = localStorage.getItem("musicPlaying");
    const time = parseFloat(localStorage.getItem("musicTime")) || 0;

    if (playing === "1") {

        try {

            music.currentTime = time;   // 👉 ต่อเพลงจากเดิม
            music.volume = 0;

            await music.play();

            // fade in
            let v = 0;
            const fade = setInterval(() => {
                v += 0.02;
                music.volume = v;

                if (v >= 0.4) clearInterval(fade);
            }, 80);

        } catch (e) {
            console.log("autoplay blocked");
        }
    }
});
</script>

</body>
</html>
